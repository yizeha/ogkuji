<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>온라인 쿠지</title>

  <link rel="stylesheet" href="./styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Luckiest+Guy&display=swap" rel="stylesheet">
</head>

<body>
  <div class="app" id="appRoot">

    <!-- 상단 -->
    <header class="topbar">
      <div class="topbar-left"></div>

      <div class="topbar-center">
        <div class="top-logo-wrap">
          <div class="top-dots left">
            <span></span>
            <span></span>
            <span></span>
          </div>

          <img
            class="top-logo"
            id="topLogo"
            src="./assets/logo_top.png"
            alt="로고"
            onerror="this.style.display='none';"
          />

          <div class="top-dots right">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>
      </div>

      <div class="topbar-right">
        <button class="mode-btn" id="btnToggleMode" type="button">방송 모드</button>
      </div>
    </header>

    <section class="layout">

      <!-- LEFT -->
      <aside class="panel left">
        <div class="panel-head">
          <div class="panel-title">당첨 결과</div>
          <div class="panel-sub">상위 등급 우선 표시</div>
        </div>

        <div class="left-split">
          <div class="left-wins no-scroll">
            <div class="winlist" id="winList"></div>
          </div>

          <div class="left-queue">
            <div class="queue-head">
              <div class="queue-title">쿠지 진행 순서</div>
              <div class="queue-sub">방송 중 순서 관리</div>
            </div>

            <div class="queue-list" id="queueList"></div>

            <div class="queue-input-row">
              <input class="queue-input" id="queueInput" placeholder="닉네임 입력" />
              <button class="queue-add-btn" id="btnAddQueue" type="button">추가</button>
            </div>
          </div>
        </div>
      </aside>

      <!-- CENTER -->
      <main class="panel center">
        <div class="boardbar">
          <div class="boardbar-left">
            <img
              class="board-logo"
              id="boardLogo"
              src="./assets/logo_board.png"
              alt="로고"
              onerror="this.style.display='none';"
            />

            <div class="board-title-wrap">
              <div class="board-title" id="kujiTitleText">오지상 쿠지</div>
            </div>
          </div>

          <div class="boardbar-right">
            <div class="info-pill info-pill-price">
              <span class="info-label">1회 가격</span>
              <span class="info-value" id="priceText">14,000원</span>
            </div>

            <div class="info-pill info-pill-account">
              <span class="info-label">입금 계좌</span>
              <span class="info-value mono" id="accountText">기업은행 153-084786-01019 양*준</span>
            </div>
          </div>
        </div>

        <div class="progressrow">
          <div class="progress-stats">
            <div class="stat-chip">
              <span class="stat-label">전체</span>
              <span class="stat-value" id="statTotalTickets">30장</span>
            </div>

            <div class="stat-chip">
              <span class="stat-label">남은 뽑기</span>
              <span class="stat-value" id="statRemainTickets">30장</span>
            </div>

            <div class="stat-chip">
              <span class="stat-label">오픈 뽑기</span>
              <span class="stat-value" id="statOpenedTickets">0장</span>
            </div>
          </div>

          <div class="progress-left">
            <div class="progress-outer">
              <div class="progress-inner" id="progressInner" style="width:0%"></div>
            </div>
            <div class="progress-text">
              <span id="progressPercent">0%</span>
            </div>
          </div>

          <div class="progress-right mono">
            <span id="openedCount">0</span>/<span id="totalCount">0</span>
          </div>
        </div>

<div class="controlbar">
  <div class="control-left">
    <div class="control-group nickname-group">
      <label class="control-label" for="drawNicknameInput">닉네임</label>
      <input
        class="control-input"
        id="drawNicknameInput"
        type="text"
        placeholder="참여자"
      />
    </div>

    <div class="control-group random-group">
      <label class="control-label" for="randomCountInput">랜덤</label>
      <input
        class="control-input small"
        id="randomCountInput"
        type="number"
        min="1"
        step="1"
        placeholder="장수"
      />
      <button class="control-btn" id="btnRandomPick" type="button">랜덤 선택</button>
    </div>
  </div>

  <div class="control-actions">
    <button class="control-btn" id="btnResetSelection" type="button">리셋</button>
    <button class="control-btn control-btn-primary" id="btnOpenSelected" type="button">오픈 (0)</button>
  </div>
</div>

        <div class="board" id="board"></div>
      </main>

      <!-- RIGHT -->
      <aside class="panel right">
        <div class="panel-head">
          <div class="panel-title">상품 목록</div>
          <div class="panel-sub" id="prizeSummary">—</div>
        </div>

        <div class="panel-body">
          <div class="prizelist" id="prizeList"></div>
        </div>
      </aside>

    </section>

    <!-- 관리자 패널 -->
    <aside class="admin" id="adminPanel">
      <div class="admin-head">
        <div class="admin-title">관리자 패널</div>
        <button class="admin-close" id="btnCloseAdmin" type="button">닫기</button>
      </div>

      <div class="admin-body">

        <!-- 상품 추가 -->
        <div class="admin-section">
          <div class="admin-section-title">상품 추가</div>

          <div class="admin-col">
            <div class="field">
              <label for="prizeNameInput">상품 이름</label>
              <input
                class="input"
                id="prizeNameInput"
                type="text"
                placeholder="예: 피규어"
              />
            </div>

            <div class="field">
              <label for="prizeLabelInput">등급</label>
              <input
                class="input"
                id="prizeLabelInput"
                type="text"
                placeholder="예: A상"
              />
            </div>

            <div class="field">
              <label for="prizeStockInput">수량</label>
              <input
                class="input"
                id="prizeStockInput"
                type="number"
                min="1"
                step="1"
                value="1"
              />
            </div>

            <div class="field">
              <label for="prizeImgInput">이미지</label>
              <input
                class="input"
                id="prizeImgInput"
                type="file"
                accept="image/*"
              />
            </div>

            <div class="field buttons">
              <button class="btn ok" id="btnAddPrize" type="button">상품 추가</button>
            </div>
          </div>
        </div>

        <!-- 라스트원 상품 설정 -->
        <div class="admin-section">
          <div class="admin-section-title">라스트원 상품 설정</div>

          <div class="admin-col">
            <div class="field">
              <label for="lastOneNameInput">상품 이름</label>
              <input
                class="input"
                id="lastOneNameInput"
                type="text"
                placeholder="예: 스피리테일 토가"
              />
            </div>

            <div class="field">
              <label for="lastOneLabelInput">표시 라벨</label>
              <input
                class="input"
                id="lastOneLabelInput"
                type="text"
                placeholder="예: LAST ONE"
              />
            </div>

            <div class="field">
              <label for="lastOneDescInput">설명</label>
              <input
                class="input"
                id="lastOneDescInput"
                type="text"
                placeholder="예: 마지막 뽑기 오픈 시 지급"
              />
            </div>

            <div class="field">
              <label for="lastOneImgInput">이미지</label>
              <input
                class="input"
                id="lastOneImgInput"
                type="file"
                accept="image/*"
              />
            </div>

            <div class="field buttons">
              <button class="btn ok" id="btnApplyLastOne" type="button">라스트원 적용</button>
            </div>

            <div class="field buttons">
              <button class="btn danger" id="btnClearLastOne" type="button">라스트원 삭제</button>
            </div>
          </div>
        </div>

        <!-- 기본 설정 -->
        <div class="admin-section">
          <div class="admin-section-title">기본 설정</div>

          <div class="admin-col">
            <div class="field">
              <label for="kujiTitleInput">쿠지명</label>
              <input
                class="input"
                id="kujiTitleInput"
                type="text"
                placeholder="예: 오지상 쿠지"
              />
            </div>

            <div class="field buttons">
              <button class="btn ok" id="btnApplyTitle" type="button">적용</button>
            </div>

            <div class="field">
              <label for="totalTicketsInput">전체 뽑기 수</label>
              <input
                class="input"
                id="totalTicketsInput"
                type="number"
                min="1"
                step="1"
                value="30"
              />
            </div>

            <div class="field buttons">
              <button class="btn ok" id="btnApplyTickets" type="button">적용</button>
            </div>
          </div>
        </div>

        <!-- 관리자 상품 목록 -->
        <div class="admin-section">
          <div class="admin-section-title">현재 상품 목록</div>
          <div class="admin-prize-manage-list" id="adminPrizeList"></div>
        </div>

        <!-- 관리 버튼 -->
        <div class="admin-section">
          <div class="admin-section-title">관리</div>

          <div class="admin-action-grid">
            <button class="btn primary" id="btnUndo" type="button">되돌리기</button>
            <button class="btn" id="btnSave" type="button">저장</button>
            <button class="btn" id="btnLoad" type="button">불러오기</button>
            <button class="btn danger" id="btnReset" type="button">전체 초기화</button>
          </div>
        </div>

      </div>
    </aside>

    <!-- 빵빠레 -->
    <audio id="fanfare" src="./assets/fanfare.mp3" preload="auto"></audio>

  </div>

  <!-- Draw Modal -->
  <div class="modal" id="drawModal" aria-hidden="true">
    <div class="modal-backdrop" id="modalBackdrop"></div>

    <div class="modal-card">
      <button class="modal-close" id="modalClose" type="button">닫기</button>

      <div class="modal-header">
        <div class="modal-title" id="modalTitle">추첨 중</div>
        <div class="modal-sub" id="modalSub">잠시만 기다려 주세요.</div>
      </div>

      <div class="modal-body">
        <div class="modal-media">
          <img id="modalResultImg" alt="결과 이미지" />
        </div>

        <div class="modal-paper" id="modalPaper">
          <img id="modalPaperImg" src="./assets/paper.png" alt="" />
        </div>

        <div class="modal-reveal" id="modalReveal">
          <div class="reveal-mask">
            <div class="reveal-big" id="modalRevealBig"></div>
            <div class="reveal-small" id="modalRevealSmall"></div>
          </div>
        </div>

        <div class="modal-loading" id="modalLoading">
          <div class="spinner small"></div>
          <div class="loading-text">추첨 중</div>
        </div>

        <div class="confetti-layer" id="modalConfetti"></div>
      </div>

      <div class="modal-footer">
        <button class="modal-ok" id="modalOk" type="button">확인</button>
      </div>
    </div>
  </div>

  <script src="./app.js"></script>
</body>
</html>
